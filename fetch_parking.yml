name: Daily Parking Data Fetch

on:
  schedule:
    # 每天台灣時間 00:00（UTC 16:00）
    - cron: "0 16 * * *"
  workflow_dispatch:  # 允許手動觸發，方便測試

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run fetch script
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: python scripts/fetch_parking.py

      - name: Commit and push parking.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/parking.json
          git diff --staged --quiet || git commit -m "chore: update parking data $(date -u '+%Y-%m-%d')"
          git push

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>臺中身障免銷單特權地圖</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.17/400.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.17/700.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] },
                    colors: { primary: '#2563EB' } /* 經典明亮藍色 */
                }
            }
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #F3F4F6; }
        #map { width: 100vw; height: 100vh; }

        /* 客製化 Google Maps InfoWindow 樣式 (極簡白淨風格) */
        .gm-style .gm-style-iw-c {
            background: #FFFFFF !important;
            border-radius: 16px !important;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1) !important;
            padding: 0 !important;
        }
        .gm-style-iw-d { overflow: hidden !important; max-height: none !important; }
        .gm-ui-hover-effect { top: 12px !important; right: 12px !important; } 
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        const API_KEY = "AIzaSyC1qbK8BJfV7IZqYf0wxLGQvyDdCt3Pv7E";
        let map, geocoder;
        let parkingData = [];
        let markers = [];
        let activeInfoWindow = null;

        window.onload = () => {
            loadGoogleMaps();
            fetchDataSilently();
        };

        // 1. 背景靜默抓取資料
        async function fetchDataSilently() {
            try {
                const targetUrl = 'https://tcparking.taichung.gov.tw/ParkWeb/Pages/PublicService/LoveCardSchedule';
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
                
                const response = await fetch(proxyUrl);
                const html = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const rows = doc.querySelectorAll('#PrintArea table tbody tr');
                
                rows.forEach((row, index) => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 4 && index > 0) {
                        parkingData.push({
                            id: cells[0].innerText.trim(),
                            name: cells[1].innerText.trim(),
                            method: cells[2].innerText.trim(),
                            address: cells[3].innerText.trim(),
                            lat: null, lng: null
                        });
                    }
                });
                
                if(parkingData.length > 0) {
                    processGeocodingSilently();
                }
            } catch (error) {
                console.error("資料獲取失敗", error);
            }
        }

        // 2. 載入明亮乾淨版 Google Maps
        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&callback=initMap`;
            script.async = true; script.defer = true;
            window.initMap = () => {
                geocoder = new google.maps.Geocoder();
                map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 24.1477, lng: 120.6736 }, // 預設台中市中心
                    zoom: 13,
                    disableDefaultUI: true, // 保持畫面極度乾淨
                    zoomControl: true, // 僅保留縮放按鈕
                    styles: [
                        { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }, // 隱藏預設地標以突顯藍色 P
                        { featureType: "transit", elementType: "labels", stylers: [{ visibility: "off" }] }
                    ]
                });
            };
            document.head.appendChild(script);
        }

        // 3. 背景解析座標並直接顯示 (無掉落動畫)
        async function processGeocodingSilently() {
            for (let i = 0; i < parkingData.length; i++) {
                while(!geocoder) await new Promise(r => setTimeout(r, 200));

                const item = parkingData[i];
                try {
                    const result = await new Promise((resolve) => {
                        geocoder.geocode({ address: item.address + ', 臺中市' }, (results, status) => {
                            if (status === 'OK' && results[0]) resolve(results[0].geometry.location);
                            else resolve(null);
                        });
                    });

                    if (result) {
                        item.lat = result.lat(); 
                        item.lng = result.lng();
                        createBluePMarker(item);
                    }
                    // 加入極短暫延遲避免觸發 Google API Rate Limit
                    await new Promise(r => setTimeout(r, 150)); 
                } catch(e) {}
            }
        }

        // 4. 建立藍色 P 標記與極簡資訊卡
        function createBluePMarker(item) {
            // 乾淨清爽的藍色 P SVG 圖示
            const svgIcon = {
                url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
                        <circle cx="16" cy="16" r="15" fill="#2563EB" stroke="#FFFFFF" stroke-width="2" box-shadow="0 4px 6px rgba(0,0,0,0.1)"/>
                        <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#FFFFFF">P</text>
                    </svg>
                `),
                scaledSize: new google.maps.Size(32, 32),
                anchor: new google.maps.Point(16, 16)
            };

            const marker = new google.maps.Marker({
                position: { lat: item.lat, lng: item.lng },
                map: map,
                icon: svgIcon
                // 取消 animation: google.maps.Animation.DROP，實現直接載入
            });

            // 產生直接搜尋 Google Maps 的 URL
            const searchQuery = encodeURIComponent(`${item.name} 停車場 ${item.address}`);
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${searchQuery}`;

            // 乾淨明亮的 InfoWindow 內容
            const infoContent = `
                <div class="p-5 min-w-[240px] font-sans text-gray-800">
                    <h3 class="text-lg font-bold mb-3 text-gray-900">${item.name}</h3>
                    
                    <div class="space-y-1.5 mb-5">
                        <div class="flex items-start gap-2 text-sm text-gray-600">
                            <span class="mt-0.5">🏷️</span>
                            <span><strong>方式：</strong>${item.method}</span>
                        </div>
                        <div class="flex items-start gap-2 text-sm text-gray-600">
                            <span class="mt-0.5">📍</span>
                            <span class="leading-relaxed">${item.address}</span>
                        </div>
                    </div>

                    <a href="${googleMapsUrl}" target="_blank" 
                       class="block w-full text-center py-2.5 rounded-lg bg-primary hover:bg-blue-700 transition-colors text-white font-bold text-sm shadow-md">
                        查看評論 / 導航
                    </a>
                </div>
            `;

            const infoWindow = new google.maps.InfoWindow({ content: infoContent });

            marker.addListener('click', () => {
                if (activeInfoWindow) activeInfoWindow.close();
                infoWindow.open({ anchor: marker, map, shouldFocus: false });
                activeInfoWindow = infoWindow;
                map.panTo(marker.getPosition());
            });

            markers.push(marker);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ TC PARKING | 臺中身障免銷單特權地圖</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.17/400.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.17/700.css">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans TC', 'sans-serif'], y2k: ['Space Grotesk', 'sans-serif'] },
                    colors: { 'neon-blue': '#3B82F6', 'y2k-purple': '#A855F7', 'acid-green': '#D9F99D', 'dark-base': '#09090B' }
                }
            }
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #09090B; }
        #map { width: 100vw; height: 100vh; }

        /* Y2K 跑馬燈特效 */
        .marquee-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 600px; z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 999px; overflow: hidden; display: flex; align-items: center; padding: 10px 0;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .marquee-content {
            display: inline-block; white-space: nowrap;
            animation: marquee 15s linear infinite;
            font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: #D9F99D; letter-spacing: 2px;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 客製化 Google Maps InfoWindow (隱藏預設白底，使用自訂設計) */
        .gm-style .gm-style-iw-c {
            background: rgba(15, 23, 42, 0.85) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(168, 85, 247, 0.4) !important;
            border-radius: 20px !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(59, 130, 246, 0.3) !important;
            padding: 0 !important;
        }
        .gm-style .gm-style-iw-t::after { display: none !important; /* 隱藏底部的箭頭 */ }
        .gm-style-iw-d { overflow: hidden !important; max-height: none !important; }
        .gm-ui-hover-effect { filter: invert(1); top: 10px !important; right: 10px !important; } /* 關閉按鈕反色 */

        /* 載入中狀態提示 */
        #loader-toast {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20;
            background: rgba(59, 130, 246, 0.1); border: 1px solid #3B82F6; color: #3B82F6;
            padding: 10px 20px; border-radius: 999px; backdrop-filter: blur(8px);
            font-weight: 700; display: flex; align-items: center; gap: 8px; transition: opacity 0.5s;
        }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 全螢幕地圖 -->
    <div id="map"></div>

    <!-- Y2K 跑馬燈浮動標頭 -->
    <div class="marquee-container">
        <div class="marquee-content">
            /// LIVE DATA /// TAICHUNG DISABLED PARKING MAP /// ZERO-CLICK INTERFACE /// EXPLORE NOW ///
        </div>
    </div>

    <!-- 狀態提示 -->
    <div id="loader-toast">
        <svg class="w-5 h-5 spin" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        <span id="loader-text">同步雷達資料中...</span>
    </div>

    <script>
        const API_KEY = "AIzaSyC1qbK8BJfV7IZqYf0wxLGQvyDdCt3Pv7E";
        let map, geocoder;
        let parkingData = [];
        let markers = [];
        let activeInfoWindow = null;

        // 1. 初始化應用程式
        window.onload = () => {
            loadGoogleMaps();
            fetchData();
        };

        function updateToast(msg, hide = false) {
            const toast = document.getElementById('loader-toast');
            document.getElementById('loader-text').innerText = msg;
            if (hide) {
                setTimeout(() => { toast.style.opacity = '0'; }, 3000);
            }
        }

        // 2. 爬取最新政府資料 (Proxy)
        async function fetchData() {
            try {
                const targetUrl = 'https://tcparking.taichung.gov.tw/ParkWeb/Pages/PublicService/LoveCardSchedule';
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
                
                const response = await fetch(proxyUrl);
                const html = await response.text();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const rows = doc.querySelectorAll('#PrintArea table tbody tr');
                
                rows.forEach((row, index) => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 4 && index > 0) { // 跳過表頭
                        parkingData.push({
                            id: cells[0].innerText.trim(),
                            name: cells[1].innerText.trim(),
                            method: cells[2].innerText.trim(),
                            address: cells[3].innerText.trim(),
                            lat: null, lng: null
                        });
                    }
                });
                
                if(parkingData.length > 0) {
                    updateToast(`成功攔截 ${parkingData.length} 筆座標！開始定位...`);
                    processGeocoding();
                } else {
                    updateToast('無法解析網頁結構', true);
                }
            } catch (error) {
                updateToast('網路異常，無法取得資料', true);
            }
        }

        // 3. 載入 Google Maps 並套用賽博龐克暗黑風格
        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&callback=initMap`;
            script.async = true; script.defer = true;
            window.initMap = () => {
                geocoder = new google.maps.Geocoder();
                map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 24.1477, lng: 120.6736 },
                    zoom: 13,
                    disableDefaultUI: true, // 移除所有多餘控制項，保持極簡
                    styles: [
                        { elementType: "geometry", stylers: [{ color: "#242f3e" }] },
                        { elementType: "labels.text.stroke", stylers: [{ color: "#242f3e" }] },
                        { elementType: "labels.text.fill", stylers: [{ color: "#746855" }] },
                        { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#d59563" }] },
                        { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] }, // 關閉預設景點，突顯我們的 P
                        { featureType: "road", elementType: "geometry", stylers: [{ color: "#38414e" }] },
                        { featureType: "road", elementType: "geometry.stroke", stylers: [{ color: "#212a37" }] },
                        { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#9ca5b3" }] },
                        { featureType: "water", elementType: "geometry", stylers: [{ color: "#17263c" }] }
                    ]
                });
            };
            document.head.appendChild(script);
        }

        // 4. 解析地址並放置地圖標記
        async function processGeocoding() {
            // 為避免 API 限制，我們採非同步逐筆解析
            let mappedCount = 0;
            for (let i = 0; i < parkingData.length; i++) {
                // 等待地圖載入完成
                while(!geocoder) await new Promise(r => setTimeout(r, 500));

                const item = parkingData[i];
                try {
                    const result = await new Promise((resolve) => {
                        geocoder.geocode({ address: item.address + ', 臺中市' }, (results, status) => {
                            if (status === 'OK' && results[0]) resolve(results[0].geometry.location);
                            else resolve(null);
                        });
                    });

                    if (result) {
                        item.lat = result.lat(); item.lng = result.lng();
                        createBluePMarker(item);
                        mappedCount++;
                    }
                    await new Promise(r => setTimeout(r, 250)); // Rate limit 緩衝
                } catch(e) {}
            }
            updateToast(`定位完成，共載入 ${mappedCount} 個停車點`, true);
        }

        // 5. 繪製自訂的「藍色 P」標記與資訊卡
        function createBluePMarker(item) {
            // 使用 SVG 建立超具質感的藍色 P 標誌
            const svgIcon = {
                url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="18" fill="#3B82F6" stroke="#FFFFFF" stroke-width="2" />
                        <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#FFFFFF">P</text>
                        <!-- Y2K 發光效果 -->
                        <circle cx="20" cy="20" r="18" fill="none" stroke="#A855F7" stroke-width="4" opacity="0.4" />
                    </svg>
                `),
                scaledSize: new google.maps.Size(40, 40),
                anchor: new google.maps.Point(20, 20)
            };

            const marker = new google.maps.Marker({
                position: { lat: item.lat, lng: item.lng },
                map: map,
                icon: svgIcon,
                animation: google.maps.Animation.DROP
            });

            // 產生直接搜尋 Google Maps 的 URL (用於評論與導航)
            const searchQuery = encodeURIComponent(`${item.name} 停車場 ${item.address}`);
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${searchQuery}`;

            // 設計 Y2K 風格的 InfoWindow 內容
            const infoContent = `
                <div class="p-5 min-w-[260px] text-white font-sans">
                    <div class="inline-block px-2 py-1 bg-neon-blue/20 text-neon-blue text-[10px] font-y2k rounded-md mb-2 border border-neon-blue/30 tracking-widest">
                        ID: ${item.id}
                    </div>
                    <h3 class="text-xl font-bold mb-3 text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">${item.name}</h3>
                    
                    <div class="space-y-2 mb-5">
                        <div class="flex items-start gap-2 text-sm text-gray-300">
                            <span class="text-acid-green mt-0.5">⚡</span>
                            <span><strong>進出場：</strong>${item.method}</span>
                        </div>
                        <div class="flex items-start gap-2 text-sm text-gray-300">
                            <span class="text-acid-green mt-0.5">📍</span>
                            <span>${item.address}</span>
                        </div>
                    </div>

                    <a href="${googleMapsUrl}" target="_blank" 
                       class="block w-full text-center py-2.5 rounded-lg bg-neon-blue hover:bg-y2k-purple transition-all duration-300 text-white font-bold text-sm shadow-[0_0_15px_rgba(59,130,246,0.5)] hover:shadow-[0_0_25px_rgba(168,85,247,0.7)] group">
                        查看 Google 評論 / 導航
                        <span class="inline-block group-hover:translate-x-1 transition-transform">→</span>
                    </a>
                </div>
            `;

            const infoWindow = new google.maps.InfoWindow({ content: infoContent });

            marker.addListener('click', () => {
                if (activeInfoWindow) activeInfoWindow.close(); // 關閉上一個
                infoWindow.open({ anchor: marker, map, shouldFocus: false });
                activeInfoWindow = infoWindow;
                // 點擊後地圖平滑置中並稍微放大
                map.panTo(marker.getPosition());
                map.setZoom(16);
            });

            markers.push(marker);
        }
    </script>
</body>
</html>

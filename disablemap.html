<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 智慧停車地圖 | TC Parking</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.17/400.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/noto-sans-tc@5.0.17/700.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Noto Sans TC', 'sans-serif'],
                        display: ['Outfit', 'sans-serif']
                    },
                    colors: { 
                        primary: '#6366F1', // Indigo 500 (搜尋目標色)
                        success: '#10B981', // Emerald (當前位置色)
                        darkness: '#0F172A' // Slate 900
                    }
                }
            }
        }
    </script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #F8FAFC; }
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }

        /* Glassmorphism 面板 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 40px -10px rgba(15, 23, 42, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-panel:focus-within {
            box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.15), 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* 客製化 Google Maps InfoWindow */
        .gm-style .gm-style-iw-c {
            background: rgba(255, 255, 255, 0.98) !important;
            backdrop-filter: blur(10px) !important;
            border-radius: 20px !important;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15) !important;
            padding: 0 !important;
        }
        .gm-style-iw-d { overflow: hidden !important; max-height: none !important; }
        .gm-ui-hover-effect { top: 14px !important; right: 14px !important; background: #F1F5F9 !important; border-radius: 50% !important; }

        /* 客製化 Google Places Autocomplete 下拉選單 (覆寫原生醜陋樣式) */
        .pac-container {
            border-radius: 16px;
            box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            font-family: 'Noto Sans TC', sans-serif;
            margin-top: 8px;
            padding: 8px 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
        }
        .pac-item { padding: 12px 16px; cursor: pointer; border-top: 1px solid #F1F5F9; font-size: 14px; color: #475569; }
        .pac-item:hover { background-color: #EEF2FF; }
        .pac-item-query { font-weight: 700; color: #0F172A; font-size: 15px; }
        .pac-icon { display: none; } /* 隱藏原生 Icon，保持極簡 */

        /* 隱藏地圖預設控制項與按鈕 */
        .gmnoprint, .gm-fullscreen-control { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="absolute z-10 top-4 left-4 right-4 md:top-8 md:left-8 md:right-auto md:w-[400px] flex flex-col gap-3 pointer-events-none" style="animation: slideDownFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;">
        
        <div class="glass-panel rounded-2xl p-2 flex items-center pointer-events-auto relative group">
            <div class="p-2.5 text-gray-400 group-focus-within:text-primary transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
            
            <input type="text" id="searchInput" placeholder="搜尋想去的地點或地址..." 
                class="w-full p-2 outline-none text-darkness bg-transparent text-[16px] placeholder-gray-400 font-medium" 
                autocomplete="off">
            
            <button id="clearBtn" onclick="clearSearch()" class="hidden p-2 text-gray-400 hover:text-gray-600 transition-colors focus:outline-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <div id="radiusStatus" class="hidden items-center self-start glass-panel px-4 py-2.5 rounded-full pointer-events-auto shadow-sm">
            <span class="relative flex h-2.5 w-2.5 mr-3">
              <span id="statusPing" class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"></span>
              <span id="statusDot" class="relative inline-flex rounded-full h-2.5 w-2.5"></span>
            </span>
            <span id="statusText" class="text-[13px] font-bold text-darkness tracking-wide">目前顯示：方圓 2 公里內</span>
            <span id="searchCount" class="ml-2 text-[12px] font-display font-bold text-primary bg-indigo-50 px-2 py-0.5 rounded-lg"></span>
        </div>
    </div>

    <button onclick="centerOnUser()" class="absolute z-10 bottom-8 right-6 md:bottom-10 md:right-10 glass-panel p-4 rounded-full text-darkness hover:text-primary transition-colors pointer-events-auto focus:outline-none hover:scale-105 active:scale-95 shadow-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
    </button>

    <script>
        const API_KEY = "AIzaSyC1qbK8BJfV7IZqYf0wxLGQvyDdCt3Pv7E";
        
        let map, geocoder, autocomplete;
        let parkingData = [];
        let mapMarkers = []; 
        let activeInfoWindow = null;
        
        // 記錄空間狀態
        let userLocation = null; // GPS 真實位置
        let activeCenterLocation = null; // 目前用來計算半徑的中心 (可能是 GPS 或 搜尋地點)
        let centerDotMarker = null;
        let radiusCircle = null;

        window.onload = () => {
            loadGoogleMaps();
            fetchDataSilently();
        };

        // 1. 載入 Google Maps (包含 places 與 geometry 庫)
        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${API_KEY}&libraries=places,geometry&callback=initMap`;
            script.async = true; script.defer = true;
            window.initMap = () => {
                geocoder = new google.maps.Geocoder();
                map = new google.maps.Map(document.getElementById('map'), {
                    center: { lat: 24.1477, lng: 120.6736 },
                    zoom: 13,
                    disableDefaultUI: true, // 保持極致乾淨
                    gestureHandling: 'greedy',
                    styles: [
                        { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
                        { featureType: "transit", elementType: "labels", stylers: [{ visibility: "off" }] }
                    ]
                });
                
                initAutocomplete();
                requestUserLocation(); // 初始載入時獲取定位
            };
            document.head.appendChild(script);
        }

        // 2. 初始化地點自動完成 (空間搜尋核心)
        function initAutocomplete() {
            const input = document.getElementById('searchInput');
            
            autocomplete = new google.maps.places.Autocomplete(input, {
                componentRestrictions: { country: "tw" }, // 限定台灣
                fields: ["geometry", "name"], // 只需要座標跟名稱
            });

            autocomplete.bindTo("bounds", map);

            // 當使用者選擇了一個地點
            autocomplete.addListener("place_changed", () => {
                const place = autocomplete.getPlace();
                if (!place.geometry || !place.geometry.location) return;

                document.getElementById('clearBtn').classList.remove('hidden');
                
                // 以新搜尋的地點作為中心，啟動探索圈
                activateRadiusCenter(place.geometry.location, place.name, 'search');
            });

            // 監聽輸入框清除事件
            input.addEventListener('input', () => {
                if(input.value.trim() === '') clearSearch();
                else document.getElementById('clearBtn').classList.remove('hidden');
            });
        }

        // 清除搜尋，還原為 GPS 定位
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearBtn').classList.add('hidden');
            
            if (userLocation) {
                activateRadiusCenter(userLocation, '目前位置', 'gps');
            } else {
                // 如果沒有 GPS 權限，清除搜尋後顯示全台中
                activeCenterLocation = null;
                if(centerDotMarker) centerDotMarker.setMap(null);
                if(radiusCircle) radiusCircle.setMap(null);
                document.getElementById('radiusStatus').classList.remove('flex');
                document.getElementById('radiusStatus').classList.add('hidden');
                mapMarkers.forEach(m => m.marker.setMap(map));
                map.setCenter({ lat: 24.1477, lng: 120.6736 });
                map.setZoom(12);
            }
        }

        // 3. 請求使用者 GPS 定位
        function requestUserLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLocation = new google.maps.LatLng(position.coords.latitude, position.coords.longitude);
                        // 如果搜尋框是空的，才預設顯示 GPS 探索圈
                        if (document.getElementById('searchInput').value.trim() === '') {
                            activateRadiusCenter(userLocation, '目前位置', 'gps');
                        }
                    },
                    (error) => { console.log("定位未授權，將顯示全部資料"); },
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                );
            }
        }

        // 4. 繪製探索圈與過濾地圖標記 (核心過濾邏輯)
        function activateRadiusCenter(location, placeName, type) {
            activeCenterLocation = location;
            
            // 決定顏色：GPS 是綠色 (Success)，搜尋是紫色 (Primary)
            const themeColor = type === 'gps' ? '#10B981' : '#6366F1';
            
            if (centerDotMarker) centerDotMarker.setMap(null);
            if (radiusCircle) radiusCircle.setMap(null);

            // 畫中心點
            centerDotMarker = new google.maps.Marker({
                position: location, map: map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE, scale: 8,
                    fillColor: themeColor, fillOpacity: 1,
                    strokeColor: '#FFFFFF', strokeWeight: 3,
                },
                zIndex: 999
            });

            // 畫 2 公里半徑圈
            radiusCircle = new google.maps.Circle({
                strokeColor: themeColor, strokeOpacity: 0.25, strokeWeight: 1,
                fillColor: themeColor, fillOpacity: 0.08,
                map: map, center: location, radius: 2000 
            });

            // 移動視角
            map.panTo(location);
            map.setZoom(14); // 14 是最適合看 2 公里半徑的縮放層級

            // 過濾並顯示該半徑內的停車場
            let matchCount = 0;
            mapMarkers.forEach(m => {
                const pos = m.marker.getPosition();
                if (pos) {
                    const distance = google.maps.geometry.spherical.computeDistanceBetween(location, pos);
                    if (distance <= 2000) {
                        m.marker.setMap(map);
                        matchCount++;
                    } else {
                        m.marker.setMap(null);
                    }
                }
            });

            // 更新 UI 狀態標籤
            const statusBox = document.getElementById('radiusStatus');
            document.getElementById('statusPing').style.backgroundColor = themeColor;
            document.getElementById('statusDot').style.backgroundColor = themeColor;
            document.getElementById('statusText').innerText = `顯示：${placeName} 方圓 2 公里`;
            document.getElementById('searchCount').innerText = `${matchCount} 筆`;
            
            statusBox.classList.remove('hidden');
            statusBox.classList.add('flex');
        }

        // 5. 點擊「定位」按鈕觸發
        function centerOnUser() {
            if (userLocation) {
                clearSearch(); // 清除搜尋，強制切回 GPS
            } else { 
                requestUserLocation(); 
            }
        }

        // --- 以下為資料抓取與圖釘生成邏輯 ---

        async function fetchDataSilently() {
            try {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://tcparking.taichung.gov.tw/ParkWeb/Pages/PublicService/LoveCardSchedule');
                const response = await fetch(proxyUrl);
                const html = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const rows = doc.querySelectorAll('#PrintArea table tbody tr');
                
                rows.forEach((row, index) => {
                    const cells = row.querySelectorAll('td');
                    if (cells.length >= 4 && index > 0) {
                        parkingData.push({
                            id: cells[0].innerText.trim(),
                            name: cells[1].innerText.trim(),
                            method: cells[2].innerText.trim(),
                            address: cells[3].innerText.trim(),
                            lat: null, lng: null
                        });
                    }
                });
                if(parkingData.length > 0) processGeocodingSilently();
            } catch (error) { console.error(error); }
        }

        async function processGeocodingSilently() {
            for (let i = 0; i < parkingData.length; i++) {
                while(!geocoder) await new Promise(r => setTimeout(r, 200));
                const item = parkingData[i];
                try {
                    const result = await new Promise((resolve) => {
                        geocoder.geocode({ address: item.address + ', 臺中市' }, (results, status) => {
                            if (status === 'OK' && results[0]) resolve(results[0].geometry.location);
                            else resolve(null);
                        });
                    });
                    if (result) {
                        item.lat = result.lat(); item.lng = result.lng();
                        createMarker(item);
                    }
                    await new Promise(r => setTimeout(r, 100)); // 避免 API 限制
                } catch(e) {}
            }
            
            // 資料全部載入後，如果有活躍的中心點，重新觸發一次過濾以更新數量
            if (activeCenterLocation) {
                const currentName = document.getElementById('searchInput').value.trim() || '目前位置';
                const type = document.getElementById('searchInput').value.trim() ? 'search' : 'gps';
                activateRadiusCenter(activeCenterLocation, currentName, type);
            }
        }

        function createMarker(item) {
            const pos = new google.maps.LatLng(item.lat, item.lng);
            let shouldShow = true;
            
            // 動態判斷生成時，是否在目前活躍的探索圈內
            if (activeCenterLocation) {
                const distance = google.maps.geometry.spherical.computeDistanceBetween(activeCenterLocation, pos);
                if (distance > 2000) shouldShow = false;
            }

            // Indigo 500 科技感 P 圖釘
            const svgIcon = {
                url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
                    <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 32 32">
                        <circle cx="16" cy="16" r="14" fill="#6366F1" stroke="#FFFFFF" stroke-width="2.5" />
                        <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="15" fill="#FFFFFF">P</text>
                    </svg>
                `),
                scaledSize: new google.maps.Size(36, 36),
                anchor: new google.maps.Point(18, 18)
            };

            const marker = new google.maps.Marker({
                position: pos, map: shouldShow ? map : null, icon: svgIcon
            });

            // 確保跳轉 Google Maps 導航/評論連結格式絕對正確 (使用官方 Intent URL)
            const searchQuery = encodeURIComponent(`${item.name} 停車場 ${item.address}`);
            const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${searchQuery}`;

            const infoContent = `
                <div class="p-6 min-w-[260px] font-sans">
                    <h3 class="text-xl font-bold mb-4 text-darkness leading-tight">${item.name}</h3>
                    <div class="space-y-3 mb-6 bg-gray-50 rounded-xl p-3 border border-gray-100">
                        <div class="flex items-start gap-3">
                            <span class="text-primary mt-0.5">🏷️</span>
                            <span class="text-sm text-gray-700 font-medium">${item.method}</span>
                        </div>
                        <div class="flex items-start gap-3">
                            <span class="text-primary mt-0.5">📍</span>
                            <span class="text-sm text-gray-600 leading-relaxed">${item.address}</span>
                        </div>
                    </div>
                    <a href="${googleMapsUrl}" target="_blank" class="flex items-center justify-center gap-2 w-full py-3.5 rounded-xl bg-primary hover:bg-indigo-600 transition-colors text-white font-bold text-[15px] shadow-lg shadow-indigo-500/30">
                        <span>開啟導航與評論</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </a>
                </div>
            `;

            const infoWindow = new google.maps.InfoWindow({ content: infoContent });
            marker.addListener('click', () => {
                if (activeInfoWindow) activeInfoWindow.close();
                infoWindow.open({ anchor: marker, map, shouldFocus: false });
                activeInfoWindow = infoWindow;
                map.panTo(marker.getPosition());
            });
            
            mapMarkers.push({ item, marker, infoWindow });
        }
    </script>
</body>
</html>

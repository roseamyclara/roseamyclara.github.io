<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBE EATS | 城市美食探險</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 全域變數設定 */
        :root {
            --primary: #FFC900;
            --secondary: #FF90E8;
            --accent: #3B3B98;
            --bg: #F4F4F0;
            --black: #000000;
            --border-width: 3px;
        }

        /* 基礎重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--black);
            overflow-x: hidden;
        }

        /* 新粗獷主義共用陰影 */
        .brutal-shadow {
            box-shadow: 6px 6px 0px var(--black);
            border: var(--border-width) solid var(--black);
        }

        /* Header */
        header {
            padding: 20px 40px;
            background-color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border-width) solid var(--black);
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 2px;
        }

        /* Hero Section (主視覺區) */
        .hero {
            padding: 80px 40px;
            background-color: var(--primary);
            border-bottom: var(--border-width) solid var(--black);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
        }

        .hero h2 {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        .hero p {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 20px;
            max-width: 600px;
            z-index: 2;
        }

        /* 主內容網格區 */
        .container {
            padding: 60px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .restaurant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 40px;
        }

        /* 餐廳卡片設計 */
        .card {
            background-color: white;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease-in-out;
            position: relative;
            animation: slideUp 0.6s ease-out backwards;
        }

        .card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 10px 10px 0px var(--black);
        }

        .card-header {
            margin-bottom: 16px;
        }

        .card-title-zh {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .card-title-en {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 12px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .tag {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 50px;
            border: 2px solid var(--black);
            background-color: var(--secondary);
            transition: transform 0.2s;
        }

        .tag:hover {
            transform: rotate(-3deg) scale(1.05);
        }

        .tag.price {
            background-color: var(--bg);
        }

        .card-body {
            flex-grow: 1;
            margin-bottom: 24px;
        }

        .recommend-title {
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .recommend-items {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* Google Map 連結按鈕 */
        .map-btn {
            display: inline-block;
            text-align: center;
            text-decoration: none;
            color: white;
            background-color: var(--accent);
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 0;
            border-radius: 8px;
            transition: all 0.1s ease-in-out;
            cursor: pointer;
            margin-top: auto;
        }

        .map-btn:hover {
            background-color: #2a2a72;
        }

        .map-btn:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px var(--black);
        }

        /* 頁尾 */
        footer {
            padding: 40px;
            text-align: center;
            background-color: var(--black);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 40px;
        }

        /* 動畫定義 */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 響應式設計 */
        @media (max-width: 768px) {
            .hero { padding: 60px 20px; }
            .container { padding: 40px 20px; }
            .hero h2 { font-size: 2.5rem; }
        }
    </style>
</head>

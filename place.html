<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>溫哥華 & 班夫 旅行地圖</title>
<style>
  :root{
    --bg:#f7f5f0;
    --card:#ffffff;
    --accent:#2f6f4f;
    --accent2:#a8c9a0;
    --text:#2b2b2b;
    --muted:#777;
    --shadow:0 4px 14px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","Helvetica Neue",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:linear-gradient(120deg,#2f6f4f,#5b9279);
    color:#fff;
    padding:24px 20px;
    text-align:center;
  }
  header h1{margin:0;font-size:1.6rem;letter-spacing:2px;}
  header p{margin:6px 0 0;font-size:0.9rem;opacity:0.85;}

  nav.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    padding:14px 10px;
    background:#fff;
    position:sticky;
    top:0;
    z-index:50;
    box-shadow:var(--shadow);
  }
  nav.tabs button{
    border:2px solid var(--accent);
    background:#fff;
    color:var(--accent);
    padding:8px 22px;
    border-radius:999px;
    font-size:0.95rem;
    cursor:pointer;
    transition:all .2s;
    font-weight:600;
  }
  nav.tabs button.active, nav.tabs button:hover{
    background:var(--accent);
    color:#fff;
  }

  .theme{display:none;}
  .theme.active{display:block;}

  .layout{
    display:flex;
    flex-wrap:wrap;
    gap:16px;
    padding:16px;
    max-width:1400px;
    margin:0 auto;
  }
  #map-wrap{
    flex:1 1 520px;
    min-width:300px;
  }
  #map{
    width:100%;
    height:560px;
    border-radius:14px;
    box-shadow:var(--shadow);
  }
  .sublabel{
    margin:14px 0 6px;
    font-size:1.1rem;
    font-weight:700;
    color:var(--accent);
    border-left:6px solid var(--accent2);
    padding-left:10px;
  }
  .list{
    flex:1 1 380px;
    min-width:300px;
    max-height:600px;
    overflow-y:auto;
    padding-right:4px;
  }
  .card{
    background:var(--card);
    border-radius:14px;
    box-shadow:var(--shadow);
    margin-bottom:12px;
    display:flex;
    overflow:hidden;
    cursor:pointer;
    border:2px solid transparent;
    transition:border-color .15s, transform .15s;
  }
  .card:hover{
    border-color:var(--accent2);
    transform:translateY(-2px);
  }
  .card img{
    width:120px;
    height:100px;
    object-fit:cover;
    flex-shrink:0;
    background:#ddd;
  }
  .card .info{
    padding:10px 12px;
    flex:1;
  }
  .card .info h3{
    margin:0 0 2px;
    font-size:1.02rem;
    color:var(--accent);
  }
  .card .info .en{
    font-size:0.78rem;
    color:var(--muted);
    margin-bottom:4px;
  }
  .card .info p{
    margin:0;
    font-size:0.84rem;
    color:var(--text);
    line-height:1.4;
  }
  .group-title{
    font-size:0.95rem;
    font-weight:700;
    margin:16px 0 8px;
    color:#555;
  }
  footer{
    text-align:center;
    padding:20px;
    color:var(--muted);
    font-size:0.8rem;
  }
  .loading-note{
    text-align:center;
    color:var(--muted);
    font-size:0.85rem;
    padding:6px;
  }
</style>
</head>
<body>

<header>
  <h1>🍁 加西旅行地圖 Vancouver & Banff</h1>
  <p>附近散步・露營・班夫 — 三大主題互動地圖</p>
</header>

<nav class="tabs">
  <button data-theme="walk" class="active">附近散步</button>
  <button data-theme="camp">露營</button>
  <button data-theme="banff">班夫</button>
</nav>

<!-- ============ THEME: 附近散步 ============ -->
<section class="theme active" id="walk">
  <div class="layout">
    <div id="map-wrap">
      <div id="map-walk" class="map"></div>
      <p class="loading-note">點選右側地點卡片可在地圖上定位並顯示照片</p>
    </div>
    <div class="list" id="list-walk"></div>
  </div>
</section>

<!-- ============ THEME: 露營 ============ -->
<section class="theme" id="camp">
  <div class="layout">
    <div id="map-wrap">
      <div id="map-camp" class="map"></div>
      <p class="loading-note">點選右側地點卡片可在地圖上定位並顯示照片</p>
    </div>
    <div class="list" id="list-camp"></div>
  </div>
</section>

<!-- ============ THEME: 班夫 ============ -->
<section class="theme" id="banff">
  <div class="layout">
    <div id="map-wrap">
      <div id="map-banff" class="map"></div>
      <p class="loading-note">點選右側地點卡片可在地圖上定位並顯示照片</p>
    </div>
    <div class="list" id="list-banff"></div>
  </div>
</section>

<footer>Made with ❤ for the trip — Google Maps Platform</footer>

const CENTERS = {
  walk:  {lat:49.2827, lng:-123.1207, zoom:11},
  camp:  {lat:48.8313, lng:-125.1359, zoom:10},
  banff: {lat:51.1784, lng:-115.5708, zoom:8}
};

const maps = {};
const markers = {lat:[]}; // placeholder

function initMap(theme){
  const c = CENTERS[theme];
  const map = new google.maps.Map(document.getElementById('map-'+theme), {
    center: {lat:c.lat, lng:c.lng},
    zoom: c.zoom,
    mapTypeControl:false,
    streetViewControl:false,
    styles:[
      {featureType:"poi",stylers:[{visibility:"off"}]},
      {featureType:"transit",stylers:[{visibility:"off"}]}
    ]
  });
  maps[theme] = map;

  const service = new google.maps.places.PlacesService(map);
  const listEl = document.getElementById('list-'+theme);

  DATA[theme].forEach(group=>{
    const gTitle = document.createElement('div');
    gTitle.className='group-title';
    gTitle.textContent = group.group;
    listEl.appendChild(gTitle);

    group.items.forEach(item=>{
      const card = document.createElement('div');
      card.className='card';
      const img = document.createElement('img');
      img.alt = item.zh;
      img.src = "https://placehold.co/120x100/2f6f4f/ffffff?text=Loading";
      const info = document.createElement('div');
      info.className='info';
      info.innerHTML = `<h3>${item.zh}</h3><div class="en">${item.en}</div><p>${item.desc}</p>`;
      card.appendChild(img);
      card.appendChild(info);
      listEl.appendChild(card);

      // Find place
      service.findPlaceFromQuery({
        query:item.query,
        fields:['geometry','photos','place_id','name']
      }, (results, status)=>{
        if(status === google.maps.places.PlacesServiceStatus.OK && results[0]){
          const place = results[0];
          const pos = place.geometry.location;

          const marker = new google.maps.Marker({
            position: pos,
            map: map,
            title: item.zh,
            label:{text: item.zh.charAt(0), color:"#fff", fontSize:"11px"}
          });

          let photoUrl = "https://placehold.co/120x100/a8c9a0/2b2b2b?text=No+Image";
          if(place.photos && place.photos.length>0){
            photoUrl = place.photos[0].getUrl({maxWidth:240, maxHeight:200});
          }
          img.src = photoUrl;

          const iw = new google.maps.InfoWindow({
            content: `<div style="max-width:220px;font-family:'Noto Sans TC',sans-serif;">
                        <img src="${photoUrl}" style="width:100%;border-radius:8px;margin-bottom:6px;">
                        <strong style="color:#2f6f4f;">${item.zh}</strong><br>
                        <span style="font-size:0.75rem;color:#777;">${item.en}</span>
                        <p style="font-size:0.82rem;margin:6px 0 0;">${item.desc}</p>
                      </div>`
          });

          marker.addListener('click', ()=> iw.open(map, marker));

          card.addEventListener('click', ()=>{
            map.panTo(pos);
            map.setZoom(13);
            iw.open(map, marker);
          });
        } else {
          img.src = "https://placehold.co/120x100/cccccc/333333?text=Not+found";
        }
      });
    });
  });
}

function initAllMaps(){
  initMap('walk');
  initMap('camp');
  initMap('banff');
}

// Tab switching
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.theme').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    const t = btn.dataset.theme;
    document.getElementById(t).classList.add('active');
    google.maps.event.trigger(maps[t], 'resize');
    maps[t].setCenter(CENTERS[t]);
  });
});
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDT_b1NLLEtd5JQPHSqPVtw75ZIjaSu_mg&libraries=places&callback=initAllMaps">
</script>

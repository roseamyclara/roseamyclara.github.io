<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BC Explorer | 野生哥倫比亞探索指南</title>
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        /* 視覺變數定義 */
        :root {
            --primary: #CCFF00;
            --secondary: #B088FF;
            --dark: #111111;
            --bg: #F4F4F0;
            --white: #FFFFFF;
            --brutal-border: 3px solid var(--dark);
            --brutal-shadow: 4px 4px 0px var(--dark);
            --brutal-shadow-hover: 8px 8px 0px var(--dark);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1, h2, h3, .space-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* 動態排版跑馬燈 */
        .marquee {
            width: 100%;
            background-color: var(--dark);
            color: var(--primary);
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: var(--brutal-border);
            z-index: 10;
        }

        .marquee-content {
            display: inline-block;
            animation: marquee 15s linear infinite;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        @keyframes marquee {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-50%); }
        }

        /* 標籤導覽列 */
        .nav-tabs {
            display: flex;
            padding: 20px;
            gap: 15px;
            background: var(--bg);
            border-bottom: var(--brutal-border);
        }

        .tab-btn {
            background: var(--white);
            border: var(--brutal-border);
            box-shadow: var(--brutal-shadow);
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Noto Sans TC', sans-serif;
        }

        .tab-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: var(--brutal-shadow-hover);
        }

        .tab-btn.active {
            background: var(--primary);
        }

        /* 主要佈局 */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 120px); /* 扣除 header */
        }

        /* 左側卡片清單區 */
        .list-section {
            width: 40%;
            padding: 20px;
            overflow-y: auto;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: var(--brutal-border);
        }

        /* 自訂捲軸 */
        .list-section::-webkit-scrollbar { width: 8px; }
        .list-section::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--dark); }
        .list-section::-webkit-scrollbar-thumb { background: var(--dark); }

        .place-card {
            background: var(--white);
            border: var(--brutal-border);
            box-shadow: var(--brutal-shadow);
            border-radius: 0;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: slideUp 0.4s ease forwards;
            opacity: 0;
        }

        .place-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: var(--brutal-shadow-hover);
            background: var(--secondary);
            color: var(--white);
        }

        .place-card.active {
            background: var(--dark);
            color: var(--primary);
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: var(--brutal-border);
            filter: grayscale(20%) contrast(120%);
        }

        .card-content {
            padding: 15px;
        }

        .card-title-en {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .card-title-zh {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .card-desc {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* 右側地圖區 */
        .map-section {
            width: 60%;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RWD 響應式設計 */
        @media (max-width: 768px) {
            .main-container { flex-direction: column-reverse; }
            .list-section { width: 100%; height: 50%; border-right: none; border-top: var(--brutal-border); }
            .map-section { width: 100%; height: 50%; }
            .nav-tabs { overflow-x: auto; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <!-- 動態跑馬燈 -->
    <div class="marquee">
        <div class="marquee-content">
            EXPLORE BRITISH COLUMBIA /// START YOUR ADVENTURE /// VANCOUVER WALKS /// WILD CAMPING /// BANFF ROADTRIP /// EXPLORE BRITISH COLUMBIA /// START YOUR ADVENTURE /// VANCOUVER WALKS /// WILD CAMPING /// BANFF ROADTRIP ///
        </div>
    </div>

    <!-- 主題切換導覽列 -->
    <div class="nav-tabs">
        <button class="tab-btn active" data-theme="walks">🚶 附近散步 (Walks)</button>
        <button class="tab-btn" data-theme="camping">🏕️ 狂野露營 (Camping)</button>
        <button class="tab-btn" data-theme="banff">⛰️ 班夫公路 (Banff)</button>
    </div>

    <div class="main-container">
        <!-- 景點清單 -->
        <div class="list-section" id="places-list">
            <!-- 卡片由 JS 動態生成 -->
        </div>

        <!-- Google Map -->
        <div class="map-section">
            <div id="map"></div>
        </div>
    </div>

    <!-- 載入 Google Maps API -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDT_b1NLLEtd5JQPHSqPVtw75ZIjaSu_mg&callback=initMap"></script>

    <script>
        // --- 景點資料庫 (依照您的需求整理、翻譯並加上圖片/座標) ---
        const locationsData = {
            walks: [
                { id: 1, en: "Stanley Park Seawall", zh: "史丹利公園海堤", desc: "溫哥華標誌性的海濱步道，可途經 Devonian Harbour Park、九點鐘大砲與燈塔。", lat: 49.3017, lng: -123.1417, img: "https://images.unsplash.com/photo-1559511260-66a654ae982a?auto=format&fit=crop&w=600&q=80" },
                { id: 2, en: "Pacific Spirit Regional Park", zh: "太平洋精神公園 & UBC", desc: "緊鄰 UBC 校區的原始森林步道，享受沉浸式森林浴。", lat: 49.2606, lng: -123.2460, img: "https://images.unsplash.com/photo-1596484552993-8e75ffbd674c?auto=format&fit=crop&w=600&q=80" },
                { id: 3, en: "False Creek", zh: "福溪水上巴士與沿岸", desc: "搭乘可愛的水上巴士，沿著南北岸散步，之後可在 Kitsilano 或 Westend 用餐。", lat: 49.2699, lng: -123.1310, img: "https://images.unsplash.com/photo-1610408544469-804d9b4be16a?auto=format&fit=crop&w=600&q=80" },
                { id: 4, en: "Grouse / Sea to Sky Mountain", zh: "松雞山與海天公路纜車", desc: "搭乘纜車直達山頂，俯瞰壯麗的大溫哥華與西海岸線。", lat: 49.3797, lng: -123.0815, img: "https://images.unsplash.com/photo-1629851610014-411a7db68128?auto=format&fit=crop&w=600&q=80" },
                { id: 5, en: "Belcarra to Deep Cove", zh: "貝爾卡拉划船到深水灣", desc: "從 Buntzen Lake 划船到絕美的 Deep Cove，途中享受寧靜的峽灣水域。", lat: 49.3175, lng: -122.9234, img: "https://images.unsplash.com/photo-1503614472-8c93d56e92ce?auto=format&fit=crop&w=600&q=80" }
            ],
            camping: [
                { id: 6, en: "Pachena Bay Campground", zh: "帕切納灣露營地", desc: "位於溫哥華島西海岸，緊鄰絕美的 Pachena Bay Beach 與著名的西海岸步道起點。", lat: 48.7904, lng: -125.1215, img: "https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7?auto=format&fit=crop&w=600&q=80" },
                { id: 7, en: "Bamfield", zh: "班菲爾德原住民小鎮", desc: "奇特的小鎮，鎮區被海灣分為兩半，必須搭船橫跨。擁有豐富的海洋科學中心歷史。", lat: 48.8329, lng: -125.1362, img: "https://images.unsplash.com/photo-1510312305653-8ed496efce84?auto=format&fit=crop&w=600&q=80" },
                { id: 8, en: "Mills Landing & Brady's Beach", zh: "木棧道與布雷迪海灘", desc: "漫步在小鎮專屬的木棧道上，前往遺世獨立的 Brady's Beach 秘境海灘。", lat: 48.8260, lng: -125.1480, img: "https://images.unsplash.com/photo-1495576775051-5af0d10aa8bf?auto=format&fit=crop&w=600&q=80" }
            ],
            banff: [
                { id: 9, en: "Glacier National Park & Rogers Pass", zh: "冰川國家公園 & 羅傑斯通道", desc: "第一天的重點！欣賞壯闊的冰河景觀，駕車穿越充滿野生動物的高山公路。", lat: 51.2998, lng: -117.5218, img: "https://images.unsplash.com/photo-1510433230623-1492dce139bb?auto=format&fit=crop&w=600&q=80" },
                { id: 10, en: "Lake Louise & Johnston Canyon", zh: "露易絲湖與強斯頓峽谷", desc: "洛磯山脈的藍寶石露易絲湖，搭配壯觀的峽谷瀑布步道。", lat: 51.4254, lng: -116.1773, img: "https://images.unsplash.com/photo-1549429598-a32039a099aa?auto=format&fit=crop&w=600&q=80" },
                { id: 11, en: "Banff Town (Cave and Basin)", zh: "班夫小鎮與溫泉遺跡", desc: "在 Banff Avenue 散步，參觀博物館，或探訪國家公園發源地 Cave and Basin。", lat: 51.1784, lng: -115.5708, img: "https://images.unsplash.com/photo-1508233620467-f79a1e0237ce?auto=format&fit=crop&w=600&q=80" },
                { id: 12, en: "Canmore (Grassi Lakes & Policeman's)", zh: "坎莫爾 (格拉西湖與河畔)", desc: "入住班夫門山度假酒店。漫步 Policeman’s Creek 木棧道，或去 Grassi Lakes 輕鬆健行。", lat: 51.0890, lng: -115.3590, img: "https://images.unsplash.com/photo-1502485542721-7f9e8a7de4d9?auto=format&fit=crop&w=600&q=80" }
            ]
        };

        let map;
        let markers = [];
        let currentInfoWindow = null;

        // 初始化地圖
        function initMap() {
            // 預設中心點設定為溫哥華
            const defaultCenter = { lat: 49.2827, lng: -123.1207 };
            
            // 採用略帶復古、對比強烈的客製化地圖樣式以符合設計理念
            const brutalistMapStyle = [
                { elementType: "geometry", stylers: [{ color: "#ebe3cd" }] },
                { elementType: "labels.text.fill", stylers: [{ color: "#523735" }] },
                { elementType: "labels.text.stroke", stylers: [{ color: "#f5f1e6" }] },
                { featureType: "water", elementType: "geometry.fill", stylers: [{ color: "#b9d3c2" }] }
            ];

            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 10,
                center: defaultCenter,
                styles: brutalistMapStyle,
                mapTypeControl: false,
                streetViewControl: false
            });

            // 預設載入「附近散步」主題
            loadTheme("walks");
        }

        // 載入不同主題的資料
        function loadTheme(theme) {
            const listContainer = document.getElementById("places-list");
            listContainer.innerHTML = ''; // 清空列表
            clearMarkers(); // 清空地圖標記

            const places = locationsData[theme];
            const bounds = new google.maps.LatLngBounds();

            places.forEach((place, index) => {
                // 1. 建立左側列表卡片
                const card = document.createElement('div');
                card.className = 'place-card';
                card.style.animationDelay = `${index * 0.1}s`; // 階梯式動畫延遲
                card.innerHTML = `
                    <img src="${place.img}" alt="${place.zh}" class="card-img">
                    <div class="card-content">
                        <div class="card-title-en">${place.en}</div>
                        <div class="card-title-zh">${place.zh}</div>
                        <div class="card-desc">${place.desc}</div>
                    </div>
                `;

                // 2. 建立地圖標記 (Marker)
                const position = { lat: place.lat, lng: place.lng };
                const marker = new google.maps.Marker({
                    position: position,
                    map: map,
                    title: place.zh,
                    animation: google.maps.Animation.DROP // 標記掉落動畫
                });
                markers.push(marker);
                bounds.extend(position);

                // 3. 建立資訊視窗 (Info Window)
                const infoWindow = new google.maps.InfoWindow({
                    content: `<div style="font-family:'Noto Sans TC',sans-serif; padding:5px;">
                                <h3 style="margin:0 0 5px 0;">${place.zh}</h3>
                                <p style="margin:0; font-size:0.9rem;">${place.en}</p>
                              </div>`
                });

                // 4. 綁定互動事件：點擊卡片
                card.addEventListener('click', () => {
                    // 移除其他卡片的 active 狀態
                    document.querySelectorAll('.place-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');

                    // 地圖平滑移動並放大
                    map.panTo(position);
                    map.setZoom(13);

                    // 標記跳動動畫
                    marker.setAnimation(google.maps.Animation.BOUNCE);
                    setTimeout(() => marker.setAnimation(null), 1500);

                    // 開啟資訊視窗
                    if (currentInfoWindow) currentInfoWindow.close();
                    infoWindow.open(map, marker);
                    currentInfoWindow = infoWindow;
                });

                // 點擊地圖標記也觸發左側卡片點擊效果
                marker.addListener('click', () => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.click();
                });

                listContainer.appendChild(card);
            });

            // 自動縮放地圖以顯示該主題所有標記
            if (places.length > 0) {
                map.fitBounds(bounds);
                // 避免單一景點縮放過大
                const listener = google.maps.event.addListener(map, "idle", function() { 
                    if (map.getZoom() > 14) map.setZoom(14); 
                    google.maps.event.removeListener(listener); 
                });
            }
        }

        // 清除現有地圖標記
        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
        }

        // 綁定上方 Tab 按鈕切換事件
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 更新按鈕狀態
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                // 載入對應主題
                const theme = e.target.getAttribute('data-theme');
                loadTheme(theme);
            });
        });
    </script>
</body>
</html>

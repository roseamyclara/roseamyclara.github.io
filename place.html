<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍁 加拿大西部旅遊指南</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Variables (Claymorphism Style) ────────────────────── */
:root {
  --bg: #E8EEF2;         
  --surface: #F1F5F9;    
  --teal: #0EA5E9;
  --amber: #F59E0B;
  --pine: #10B981;
  --t1: #1F2937;
  --t2: #4B5563;
  --t3: #9CA3AF;
  
  --clay-shadow: 6px 6px 12px rgba(170, 182, 198, 0.4), -6px -6px 12px rgba(255, 255, 255, 0.9);
  --clay-pressed: inset 4px 4px 8px rgba(170, 182, 198, 0.4), inset -4px -4px 8px rgba(255, 255, 255, 0.9);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--t1); }

/* ── Layout ─────────────────────────────────────── */
#app { display: flex; height: 100vh; position: relative; }
#sidebar {
  width: 400px; min-width: 400px; display: flex; flex-direction: column;
  background: var(--bg);
  position: relative; z-index: 10;
  box-shadow: 4px 0 24px rgba(0,0,0,0.05);
}

/* ── Header ─────────────────────────────────────── */
#header { padding: 12px 24px 16px; position: relative; flex-shrink: 0; }
.aurora-bar {
  height: 6px; border-radius: 6px; margin-bottom: 16px;
  background: linear-gradient(90deg, var(--pine), var(--teal), var(--amber), var(--teal), var(--pine));
  background-size: 300%; animation: aurora 6s ease-in-out infinite;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
}
@keyframes aurora { 0%, 100% { background-position: 0% } 50% { background-position: 100% } }
.site-title { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; color: var(--t1); }
.site-sub { font-size: 12px; font-weight: 600; color: var(--t3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

/* ── Tabs (Clay Buttons) ─────────────────────────── */
#tabs { display: flex; gap: 12px; padding: 0 20px 16px; flex-shrink: 0; }
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 14px 6px; border-radius: 20px; border: none;
  background: var(--surface); color: var(--t2);
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 600;
  box-shadow: var(--clay-shadow);
  transition: all 0.2s ease; cursor: pointer;
}
.tab .ti { font-size: 26px; line-height: 1; transition: transform 0.3s; }
.tab:active { box-shadow: var(--clay-pressed); transform: scale(0.98); }
.tab.aw { color: var(--pine); box-shadow: inset 2px 2px 4px rgba(16,185,129,0.1), var(--clay-shadow); }
.tab.ac { color: var(--amber); box-shadow: inset 2px 2px 4px rgba(245,158,11,0.1), var(--clay-shadow); }
.tab.ab { color: var(--teal); box-shadow: inset 2px 2px 4px rgba(14,165,233,0.1), var(--clay-shadow); }

/* ── List View ───────────────────────────────────── */
#list-view { 
  flex: 1; overflow-y: auto; padding: 4px 20px 80px; 
  -webkit-overflow-scrolling: touch; 
  overscroll-behavior: contain;
}
#list-view::-webkit-scrollbar { width: 0; }
.g-label { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; color: var(--t3); padding: 16px 4px 8px; margin-bottom: 8px; }
.loc-card {
  display: flex; gap: 14px; align-items: stretch;
  padding: 16px; border-radius: 24px; border: 2px solid rgba(255,255,255,0.5);
  background: var(--surface); cursor: pointer; margin-bottom: 16px;
  box-shadow: var(--clay-shadow);
  transition: all 0.2s ease;
}
.loc-card:active { transform: scale(0.98); box-shadow: var(--clay-pressed); }
.loc-num {
  width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.nw { background: #D1FAE5; color: var(--pine) }
.nc { background: #FEF3C7; color: var(--amber) }
.nb { background: #E0F2FE; color: var(--teal) }
.loc-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.loc-zh { font-family: 'Noto Serif TC', serif; font-size: 16px; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.loc-en { font-size: 12px; color: var(--t3); margin-top: 4px; font-weight: 500; }
.loc-snip { font-size: 13px; color: var(--t2); margin-top: 8px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.loc-thumb { width: 72px; height: 72px; border-radius: 16px; object-fit: cover; background: var(--bg); flex-shrink: 0; border: 2px solid white; box-shadow: 2px 4px 8px rgba(0,0,0,0.05); }

/* ── Detail View ─────────────────────────────────── */
#detail-view { 
  display: none; 
  flex: 1; 
  overflow-y: auto; 
  padding: 0 20px 120px; 
  -webkit-overflow-scrolling: touch; 
  overscroll-behavior: contain;
}
#detail-view::-webkit-scrollbar { width: 0; }
.d-back {
  display: inline-flex; align-items: center; gap: 8px; padding: 12px 20px; margin: 0 0 20px 0;
  border-radius: 20px; background: var(--surface); border: none; color: var(--t2);
  font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: var(--clay-shadow); transition: all 0.2s;
}
.d-back:active { box-shadow: var(--clay-pressed); transform: scale(0.95); }
#d-zh { font-family: 'Noto Serif TC', serif; font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; color: var(--t1); padding: 0 4px; }
#d-en { font-size: 14px; font-weight: 500; color: var(--t3); margin-bottom: 20px; padding: 0 4px; }
#d-img-inner { width: 100%; border-radius: 24px; overflow: hidden; margin-bottom: 24px; box-shadow: var(--clay-shadow); border: 4px solid #FFF; }
#d-img-inner img { width: 100%; height: auto; max-height: 300px; object-fit: cover; display: block; }
#d-desc { font-size: 16px; line-height: 1.8; color: var(--t2); padding: 0 4px; }

/* ── Custom Map Markers ──────────────────────────── */
.custom-marker {
  position: relative; width: 60px; height: 60px;
  border-radius: 18px; background: white; padding: 4px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  transition: transform 0.2s ease; cursor: pointer;
}
.custom-marker:active { transform: scale(0.9); }
.marker-bg {
  width: 100%; height: 100%; border-radius: 14px;
  background-size: cover; background-position: center; background-color: var(--bg);
  display: flex; align-items: center; justify-content: center; font-size: 24px;
}
.marker-badge {
  position: absolute; top: -8px; right: -8px;
  width: 26px; height: 26px; border-radius: 50%;
  background: #111827; color: white; border: 2px solid white;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; font-family: 'Noto Sans TC', sans-serif;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

/* ── Map ─────────────────────────────────────────── */
#map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* ── Mobile Responsive & Draggable Drawer ────────── */
#drag-handle-zone { display: none; }

@media(max-width: 760px){
  #app { display: block; }
  #map-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 100vh; z-index: 1; }
  
  #sidebar {
    position: absolute; bottom: 0; left: 0; width: 100%; min-width: unset; height: 45vh;
    border-radius: 36px 36px 0 0; background: var(--bg);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
    border-top: 1px solid rgba(255,255,255,0.8);
    overscroll-behavior: none; 
  }
  
  /* 優化：加高把手觸控熱區，讓手指極度容易抓取 */
  #drag-handle-zone {
    display: flex; justify-content: center; align-items: center;
    width: 100%; height: 48px; flex-shrink: 0; position: relative; z-index: 20;
    touch-action: none; 
    cursor: grab;
  }
  #drag-handle-zone::before {
    content: ''; width: 48px; height: 6px; border-radius: 6px;
    background: #CBD5E1; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
  }
  #header { padding-top: 0; }
}

/* Info Window */
.gm-style .gm-style-iw-c { padding: 0 !important; border-radius: 16px !important; }
.gm-style .gm-style-iw-d { overflow: hidden !important; }
.ph { width: 100%; height: 220px; display: flex; align-items: center; justify-content: center; font-size: 48px; background: var(--surface); color: var(--t3); }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="drag-handle-zone"></div>
    <div id="header">
      <div class="aurora-bar"></div>
      <div class="site-title">🍁 加拿大西部旅遊指南</div>
      <div class="site-sub">Western Canada Travel Guide</div>
    </div>

    <div id="tabs">
      <button class="tab" id="tab-walking" onclick="switchTheme('walking')">
        <span class="ti">🚶</span>附近散步
      </button>
      <button class="tab" id="tab-camping" onclick="switchTheme('camping')">
        <span class="ti">⛺</span>露營
      </button>
      <button class="tab" id="tab-banff" onclick="switchTheme('banff')">
        <span class="ti">🏔</span>斑夫
      </button>
    </div>

    <div id="list-view"></div>

    <div id="detail-view">
      <button class="d-back" onclick="goBack()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        返回列表
      </button>
      <div id="d-zh"></div>
      <div id="d-en"></div>
      <div id="d-img-inner"><div class="ph">🏞</div></div>
      <div id="d-desc"></div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
  </div>
</div>

<script>
const THEMES = {
  walking: {
    label:'附近散步', icon:'🚶', color:'#10B981', tabCls:'aw',
    center:{lat:49.285,lng:-123.10}, zoom:11,
    groups:[
      { name:'Stanley Park 史丹利公園', locs:[
        { id:'sp1', zh:'史丹利公園海堤', en:'Stanley Park Seawall',
          lat:49.3043, lng:-123.1443,
          desc:'溫哥華最著名的海濱步道，全長約10公里，環繞整個史丹利公園。沿途可欣賞英吉利灣湛藍海景、北岸山脈積雪山峰和市區璀璨天際線。步道平整寬闊，適合步行、騎自行車 or 直排輪，是溫哥華必訪戶外景點。',
          q:'Stanley Park Seawall Vancouver' }
      ]}
      // (其餘資料基於篇幅隱藏，請與先前的 THEMES 完整資料物件無縫接合)
    ]
  },
  camping: {
    label:'露營', icon:'⛺', color:'#F59E0B', tabCls:'ac',
    center:{lat:48.825,lng:-125.145}, zoom:13,
    groups:[
      { name:'帕切納灣 Pachena Bay', locs:[
        { id:'pb1', zh:'帕切納灣露營地', en:'Pachena Bay Campground',
          lat:48.8018, lng:-125.1036,
          desc:'溫哥華島西岸的野性露營地，由赫曲薩特原住民族管理。夜晚可在無光害的天空下仰望銀河，聆聽太平洋浪濤聲入眠。提供廁所等基本設施，是西海岸步道北段的起點。',
          q:'Pachena Bay Campground Bamfield BC' }
      ]}
    ]
  },
  banff: {
    label:'斑夫', icon:'🏔', color:'#0EA5E9', tabCls:'ab',
    center:{lat:51.17,lng:-115.57}, zoom:11,
    groups:[
      { name:'班夫國家公園', locs:[
        { id:'bf2', zh:'路易斯湖', en:'Lake Louise',
          lat:51.4254, lng:-116.1773,
          desc:'加拿大最著名的湖泊，翡翠綠湖水倒映白雪皚皚的維多利亞冰川，是世界最美風景之一。湖畔百年城堡酒店是歷史地標。沿湖步道可前往湖濱茶屋，景色步步驚艷。',
          q:'Lake Louise Banff National Park Alberta' }
      ]}
    ]
  }
};

let map, psvc, iw;
let markers = [];
let curTheme = 'walking';
let photoCache = {};
let allLocs = []; 
const sidebar = document.getElementById('sidebar');

function initMap(){
  map = new google.maps.Map(document.getElementById('map'), {
    center: THEMES.walking.center, zoom: THEMES.walking.zoom,
    mapId: 'DEMO_MAP_ID', disableDefaultUI: true, zoomControl: false, gestureHandling: 'greedy'
  });
  psvc = new google.maps.places.PlacesService(map);
  iw = new google.maps.InfoWindow({maxWidth: 300});
  switchTheme('walking');
}

/* ═══════════════════════════════════════════════════════════
    核心優化：手勢意圖預測 (Flick to Snap)
═══════════════════════════════════════════════════════════ */
const dragZone = document.getElementById('drag-handle-zone');
let startY = 0;
let startHeightPx = 0;

dragZone.addEventListener('touchstart', (e) => {
  if (window.innerWidth > 760) return;
  startY = e.touches[0].clientY;
  startHeightPx = sidebar.getBoundingClientRect().height;
  sidebar.style.transition = 'none'; // 移除過場，讓拖曳跟手
}, { passive: true });

dragZone.addEventListener('touchmove', (e) => {
  if (window.innerWidth > 760) return;
  const currentY = e.touches[0].clientY;
  const dy = startY - currentY; // 往上滑 dy 為正數
  let newHeight = startHeightPx + dy;
  sidebar.style.height = newHeight + 'px';
}, { passive: true });

dragZone.addEventListener('touchend', (e) => {
  if (window.innerWidth > 760) return;
  const endY = e.changedTouches[0].clientY;
  const dy = startY - endY; // 往上滑 dy 為正數
  
  // 意圖預測：只要「輕拉」超過 30px，自動補足動畫，直接吸附到滿版或縮回
  if (dy > 30) {
    snapDrawerTo(100); // 向上輕觸 -> 滿版
  } else if (dy < -30) {
    snapDrawerTo(45);  // 向下輕觸 -> 收合半版
  } else {
    // 若滑動距離極短（猶豫不決），則就近吸附
    const currentVh = (sidebar.getBoundingClientRect().height / window.innerHeight) * 100;
    if (currentVh > 72) {
      snapDrawerTo(100);
    } else {
      snapDrawerTo(45);
    }
  }
});

function snapDrawerTo(vh) {
  if (window.innerWidth > 760) return;
  // 加入優雅的貝茲曲線，讓彈射過程充滿原生的流暢感
  sidebar.style.transition = 'height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1)';
  sidebar.style.height = vh + 'vh';
}

/* ═══════════════════════════════════════════════════════════
    頁面邏輯
═══════════════════════════════════════════════════════════ */
function switchTheme(name){
  curTheme = name;
  ['walking','camping','banff'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab' + (t===name ? ' '+THEMES[t].tabCls : '');
  });
  if(!map) return;
  const th = THEMES[name];
  clearMarkers();
  map.setCenter(th.center);
  map.setZoom(th.zoom);
  allLocs = [];
  th.groups.forEach(g => g.locs.forEach(l => allLocs.push(l)));
  addMarkers(th, name);
  goBack();
  renderList(th, name);
  snapDrawerTo(45); 
}

function clearMarkers(){
  markers.forEach(m => m.map = null);
  markers = [];
  if(iw) iw.close();
}

function addMarkers(th, name){
  let idx = 1;
  th.groups.forEach(g => {
    g.locs.forEach(loc => {
      const el = document.createElement('div');
      el.className = 'custom-marker';
      el.innerHTML = `<div class="marker-bg" id="mk-bg-${loc.id}">${th.icon}</div><div class="marker-badge">${idx}</div>`;
      const mk = new google.maps.marker.AdvancedMarkerElement({ map, position: {lat: loc.lat, lng: loc.lng}, content: el, title: loc.zh, zIndex: idx });
      loadPhoto(loc, url => { const bg = el.querySelector(`#mk-bg-${loc.id}`); if(bg) { bg.style.backgroundImage = `url(${url})`; bg.innerHTML = ''; } }, 100, 100);
      mk.addListener('click', () => onMarkerClick(loc, name, mk));
      markers.push(mk);
      idx++;
    });
  });
}

function onMarkerClick(loc, name, mk){
  const th = THEMES[name];
  const appUrl = `https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}`;
  const content = `
    <a href="${appUrl}" target="_blank" style="text-decoration:none; color:inherit; display:block; padding:12px;">
      <div style="font-family:'Noto Sans TC',sans-serif; width:220px;">
        <div id="iw-ph-${loc.id}" style="height:110px; background:#E8EEF2; display:flex; align-items:center; justify-content:center; font-size:36px; border-radius:12px; overflow:hidden; margin-bottom:12px;">${th.icon}</div>
        <div style="padding:0 4px;">
          <div style="font-family:'Noto Serif TC',serif; font-size:16px; font-weight:700; color:#1F2937; margin-bottom:4px;">${loc.zh}</div>
          <div style="font-size:11px; color:#6B7280; font-weight:500;">${loc.en}</div>
          <div style="font-size:12px; color:#4B5563; margin-top:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.4;">${loc.desc}</div>
        </div>
        <div style="margin-top:12px; font-size:12px; color:#0EA5E9; font-weight:700; text-align:right;">查看位置 ↗</div>
      </div>
    </a>`;
  iw.setContent(content); iw.open(map, mk);
  loadPhoto(loc, url => { const el = document.getElementById('iw-ph-'+loc.id); if(el) el.innerHTML = `<img src="${url}" style="width:100%; height:110px; object-fit:cover; display:block">`; }, 320, 160);
  showDetail(loc, name);
}

let photoQ=[], photoRunning=false;
function loadPhoto(loc, cb, w=160, h=160){
  const key=`${loc.id}_${w}`;
  if(photoCache[key]){ cb(photoCache[key]); return; }
  photoQ.push({loc,cb,w,h,key}); drainQ();
}
function drainQ(){
  if(photoRunning||!photoQ.length) return;
  photoRunning=true;
  const {loc,cb,w,h,key}=photoQ.shift();
  psvc.findPlaceFromQuery({query:loc.q,fields:['photos']}, (res,status)=>{
    if(status===google.maps.places.PlacesServiceStatus.OK && res?.[0]?.photos?.length){
      const url=res[0].photos[0].getUrl({maxWidth:w,maxHeight:h});
      photoCache[key]=url;
      const dkey=`${loc.id}_760`;
      if(!photoCache[dkey]) photoCache[dkey]=res[0].photos[0].getUrl({maxWidth:760,maxHeight:400});
      cb(url);
    }
    photoRunning=false; setTimeout(drainQ,80);
  });
}

function renderList(th, name){
  const el=document.getElementById('list-view'); el.innerHTML='';
  const cls=name==='walking'?'nw':name==='camping'?'nc':'nb';
  let idx=1;
  th.groups.forEach(g=>{
    const gl=document.createElement('div'); gl.className='g-label'; gl.textContent=g.name; el.appendChild(gl);
    g.locs.forEach(loc=>{
      const n=idx; const card=document.createElement('div'); card.className='loc-card'; card.id='card-'+loc.id;
      const phSvg=`data:image/svg+xml,${encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' width='72' height='72'><rect width='72' height='72' rx='16' fill='%23E8EEF2'/><text x='36' y='46' text-anchor='middle' font-size='28'>${th.icon}</text></svg>`)}`;
      card.innerHTML=`
        <div class="loc-num ${cls}">${n}</div>
        <div class="loc-info">
          <div class="loc-zh">${loc.zh}</div>
          <div class="loc-en">${loc.en}</div>
          <div class="loc-snip">${loc.desc}</div>
        </div>
        <img class="loc-thumb" alt="${loc.zh}" src="${phSvg}">`;
      card.onclick=()=>{
        map.panTo({lat:loc.lat,lng:loc.lng}); map.setZoom(15);
        const mk=markers[allLocs.findIndex(l=>l.id===loc.id)];
        if(mk) google.maps.event.trigger(mk,'click');
        showDetail(loc, name); 
      };
      el.appendChild(card);
      const thumbEl=card.querySelector('.loc-thumb');
      setTimeout(()=>loadPhoto(loc, url=>{ thumbEl.src=url; }, 140, 140), (n-1)*100);
      idx++;
    });
  });
}

function showDetail(loc, name){
  snapDrawerTo(100); // 一點擊自動衝到最滿
  document.getElementById('list-view').style.display='none';
  document.getElementById('detail-view').style.display='block';
  document.getElementById('detail-view').scrollTop = 0; 
  document.getElementById('d-zh').textContent=loc.zh;
  document.getElementById('d-en').textContent=loc.en;
  document.getElementById('d-desc').textContent=loc.desc;

  const inner=document.getElementById('d-img-inner');
  const th=THEMES[name];
  const dkey=`${loc.id}_760`;
  
  if(photoCache[dkey]){
    inner.innerHTML=`<img src="${photoCache[dkey]}" alt="${loc.zh}">`;
  } else {
    inner.innerHTML=`<div class="ph">${th.icon}</div>`;
    loadPhoto(loc, url=>{ inner.innerHTML=`<img src="${url}" alt="${loc.zh}">`; }, 760, 400);
  }
}

function goBack(){
  snapDrawerTo(45);
  document.getElementById('list-view').style.display='block';
  document.getElementById('detail-view').style.display='none';
  if(iw) iw.close();
}
</script>

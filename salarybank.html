<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編制外教師管理系統</title>
    <style>
        /* 引入 Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap');

        :root {
            --primary: #6366F1;
            --primary-hover: #4F46E5;
            --bg-color: #F8FAFC;
            --card-bg: #ffffff;
            --text-main: #1E293B;
            --success: #22C55E;
        }

        body.login-prompt {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
        }

        /* --- Login Container (Claymorphism style) --- */
        #login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.1), -5px -5px 20px rgba(255,255,255,0.5);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        #login-container h2 {
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 24px;
            font-size: 24px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            border-color: var(--primary);
            outline: none;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* --- Main App Styles --- */
        body.app-loaded {
            background-color: var(--bg-color);
            padding: 20px;
        }

        .container {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            gap: 20px;
        }

        .sidebar {
            flex: 0 0 240px;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        .main-content {
            flex: 1;
            background: white;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            color: var(--text-main);
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        th {
            text-align: left;
            padding: 12px;
            color: #64748B;
            font-weight: 500;
        }

        td {
            padding: 16px 12px;
            background-color: #F8FAFC;
        }

        tr td:first-child { border-radius: 12px 0 0 12px; }
        tr td:last-child { border-radius: 0 12px 12px 0; }

        .id-cell {
            cursor: pointer;
            color: var(--primary);
            font-weight: 600;
            font-family: monospace;
            transition: all 0.2s;
            position: relative;
        }

        .id-cell:hover {
            color: var(--primary-hover);
            background-color: #EEF2FF;
        }

        #category-list {
            list-style: none;
            padding: 0;
        }

        #category-list li {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #category-list li.active {
            background-color: var(--primary);
            color: white;
        }

        #app-wrapper { display: none; }
    </style>
</head>
<body class="login-prompt">

    <div id="login-container">
        <h2>PORTAL LOGIN</h2>
        <input type="password" id="password-input" placeholder="請輸入密碼">
        <button id="login-button">進入系統</button>
        <div id="login-error" style="color: #EF4444; margin-top: 10px; font-size: 14px;"></div>
    </div>

    <div id="app-wrapper">
        <div class="container">
            <aside class="sidebar">
                <h3 style="margin-top:0">篩選類別</h3>
                <ul id="category-list"></ul>
            </aside>
            <main class="main-content">
                <h1>✨ 編制外教師名冊</h1>
                <table>
                    <thead>
                        <tr>
                            <th>類別</th>
                            <th>姓名</th>
                            <th>身分證 (點擊複製前6位數字)</th>
                            <th>薪轉銀行</th>
                        </tr>
                    </thead>
                    <tbody id="personnel-table-body"></tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = "fn132";
        const personnelData = [
            { category: "華語文教師", name: "潘青心", id: "B260036897", bank: "郵局" },
            { category: "ELTA外師", name: "LE KHANH TUONG", id: "L800272340", bank: "郵局" },
            { category: "ELTA外師", name: "LE TUAN DAT", id: "B800325526", bank: "國泰世華" },
            { category: "手語教師", name: "申屠名俐", id: "F221938936", bank: "台灣銀行" },
            { category: "短代教師", name: "呂懷平", id: "L122195393", bank: "土地銀行" },
            { category: "教助員", name: "李聖心", id: "B220479792", bank: "土地銀行" },
            { category: "治療師", name: "林芮怡", id: "K222082857", bank: "台灣銀行" }
            // ... 其餘資料省略
        ];

        // --- 核心複製邏輯修改處 ---
        function copyIdNumber(fullId, cellElement) {
            if (!fullId) return;

            // 改動：從 index 1 開始擷取到 index 7 (不包含 7)，即擷取第 2 到第 7 個字元
            const idNumber = fullId.substring(1, 7); 
            
            navigator.clipboard.writeText(idNumber).then(() => {
                const originalText = cellElement.textContent;
                cellElement.textContent = `已複製 ${idNumber}!`;
                cellElement.style.color = "#22C55E";
                
                setTimeout(() => {
                    cellElement.textContent = originalText;
                    cellElement.style.color = "";
                }, 1000);
            });
        }

        function populateTable(data) {
            const tableBody = document.getElementById('personnel-table-body');
            tableBody.innerHTML = '';
            data.forEach(person => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${person.category}</td>
                    <td>${person.name}</td>
                    <td class="id-cell">${person.id}</td>
                    <td>${person.bank}</td>
                `;
                row.querySelector('.id-cell').addEventListener('click', (e) => copyIdNumber(person.id, e.target));
                tableBody.appendChild(row);
            });
        }

        function populateCategories() {
            const list = document.getElementById('category-list');
            const categories = [...new Set(personnelData.map(p => p.category))];
            categories.forEach(cat => {
                const li = document.createElement('li');
                li.textContent = cat;
                li.onclick = () => {
                    document.querySelectorAll('#category-list li').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    populateTable(personnelData.filter(p => p.category === cat));
                };
                list.appendChild(li);
            });
        }

        // --- 登入邏輯 ---
        document.getElementById('login-button').onclick = () => {
            const pw = document.getElementById('password-input').value;
            if (pw === CORRECT_PASSWORD) {
                document.body.className = 'app-loaded';
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-wrapper').style.display = 'block';
                populateCategories();
                populateTable(personnelData);
            } else {
                document.getElementById('login-error').textContent = '密碼錯誤';
            }
        };
    </script>
</body>
</html>

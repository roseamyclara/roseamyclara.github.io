<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編制外教師 - 管理系統</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

        :root {
            --primary: #6366f1;
            --secondary: #a5b4fc;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --shadow: 20px 20px 60px #d1d5db, -20px -20px 60px #ffffff;
            --clay-shadow: inset 4px 4px 8px rgba(255,255,255,0.6), inset -4px -4px 8px rgba(0,0,0,0.05), 8px 8px 16px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            transition: all 0.5s ease;
        }

        /* --- 登入介面 Claymorphism 風格 --- */
        body.login-prompt {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0e7ff 0%, #f8fafc 100%);
        }

        #login-container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            box-shadow: var(--shadow);
            text-align: center;
            width: 320px;
        }

        #login-container h2 {
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 25px;
        }

        input[type="password"] {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 15px;
            background: #f1f5f9;
            box-shadow: inset 2px 2px 5px #cbd5e1, inset -2px -2px 5px #ffffff;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--clay-shadow);
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px) scale(1.05);
        }

        /* --- 主程式介面 --- */
        .container {
            display: flex;
            max-width: 1200px;
            margin: 40px auto;
            gap: 30px;
            padding: 0 20px;
        }

        .sidebar {
            flex: 0 0 250px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 25px;
            box-shadow: var(--clay-shadow);
            height: fit-content;
        }

        .main-content {
            flex: 1;
            background: var(--card-bg);
            padding: 35px;
            border-radius: 30px;
            box-shadow: var(--clay-shadow);
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, var(--primary), #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 表格優化 */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            padding: 15px;
            text-align: left;
            color: #64748b;
            font-weight: 700;
        }

        td {
            padding: 15px;
            background: #f8fafc;
            border-radius: 0;
        }

        tr td:first-child { border-radius: 15px 0 0 15px; }
        tr td:last-child { border-radius: 0 15px 15px 0; }

        /* ID 欄位點擊樣式 */
        .id-cell {
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .id-cell:active {
            transform: scale(0.95);
        }

        .id-cell::after {
            content: 'Copy 6-digits';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .id-cell:hover::after {
            opacity: 1;
        }

        #app-wrapper { display: none; }
    </style>
</head>
<body class="login-prompt">

    <div id="login-container">
        <h2>👋 歡迎回來</h2>
        <input type="password" id="password-input" placeholder="請輸入門鎖密碼">
        <button id="login-button">進入系統</button>
        <div id="login-error" style="color: var(--accent); margin-top: 10px; font-size: 0.8em;"></div>
    </div>

    <div id="app-wrapper">
        <div class="container">
            <aside class="sidebar">
                <h3 style="margin-top:0">類別</h3>
                <ul id="category-list" style="list-style:none; padding:0;"></ul>
            </aside>
            <main class="main-content">
                <h1 id="main-title">編制外教師</h1>
                <table>
                    <thead>
                        <tr>
                            <th>類別</th>
                            <th>姓名</th>
                            <th>身分證 (點擊前6位)</th>
                            <th>銀行</th>
                        </tr>
                    </thead>
                    <tbody id="personnel-table-body"></tbody>
                </table>
            </main>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = "fn132";
        const personnelData = [
            { category: "華語文教師", name: "潘青心", id: "B260036897", bank: "郵局" },
            { category: "ELTA外師", name: "LE KHANH TUONG", id: "L800272340", bank: "郵局" },
            { category: "ELTA外師", name: "LE TUAN DAT", id: "B800325526", bank: "國泰世華" },
            { category: "手語教師", name: "申屠名俐", id: "F221938936", bank: "台灣銀行" },
            { category: "短代教師", name: "呂懷平", id: "L122195393", bank: "土地銀行" },
            { category: "短代教師", name: "劉承庭", id: "L124935108", bank: "土地銀行" },
            { category: "短代教師", name: "劉藩郁", id: "L120034548", bank: "土地銀行" },
            { category: "短代教師", name: "徐佳宸", id: "L125466497", bank: "土地銀行" },
            { category: "教助員", name: "李聖心", id: "B220479792", bank: "土地銀行" },
            { category: "教助員", name: "羅沛婷", id: "L223096104", bank: "土地銀行" },
            { category: "治療師", name: "林芮怡", id: "K222082857", bank: "台灣銀行" },
            { category: "治療師", name: "蘇秋溶", id: "V220304591", bank: "國泰世華" },
            { category: "高關懷教師", name: "莊惠如", id: "B223419029", bank: "國泰世華" },
            { category: "高關懷教師", name: "蕭乃源", id: "L120023849", bank: "新光銀行" },
            { category: "社團教師", name: "林俞瑄", id: "B223478573", bank: "台灣銀行" },
            { category: "社團教師", name: "施宇哲", id: "L124375040", bank: "土地銀行" },
            { category: "社團教師", name: "張世豪", id: "L123563993", bank: "土地銀行" },
            { category: "社團教師", name: "陳裕亮", id: "L122122470", bank: "土地銀行" },
            { category: "本土語(族語)教師", name: "鍾美欄", id: "T222169927", bank: "土地銀行" },
            { category: "本土語(族語)教師", name: "謝麗芬", id: "K221566372", bank: "台灣銀行" },
            { category: "本土語(族語)教師", name: "陳淑蕙", id: "V220622647", bank: "台灣銀行" },
            { category: "新住民語教師", name: "潘青心", id: "B260036897", bank: "郵局" },
            { category: "新住民語教師", name: "溫琪琳", id: "L225196643", bank: "郵局" }
        ];

        // --- 核心邏輯：修改點擊複製為前六位 ---
        function copyIdNumber(fullId, cellElement) {
            // 使用 substring(0, 6) 取前六個字元 (例如: B12345)
            const partialId = fullId.substring(0, 6); 
            
            navigator.clipboard.writeText(partialId).then(() => {
                const originalText = cellElement.textContent;
                cellElement.textContent = 'Copied! ✅';
                cellElement.style.color = '#10b981';
                
                setTimeout(() => {
                    cellElement.textContent = originalText;
                    cellElement.style.color = '';
                }, 1000);
            });
        }

        // 初始化與登入邏輯 (省略重複樣板，保留核心機制)
        function initApp() {
            const tbody = document.getElementById('personnel-table-body');
            const categoryList = document.getElementById('category-list');
            
            // 渲染表格
            const render = (data) => {
                tbody.innerHTML = data.map(p => `
                    <tr>
                        <td>${p.category}</td>
                        <td>${p.name}</td>
                        <td class="id-cell" onclick="copyIdNumber('${p.id}', this)">${p.id}</td>
                        <td>${p.bank}</td>
                    </tr>
                `).join('');
            };

            // 渲染分類按鈕
            const categories = ['全部', ...new Set(personnelData.map(p => p.category))];
            categoryList.innerHTML = categories.map(c => `
                <li onclick="filterCategory('${c}')" style="cursor:pointer; padding:10px; margin-bottom:5px; border-radius:10px; background:#f1f5f9;">${c}</li>
            `).join('');

            window.filterCategory = (cat) => {
                const filtered = cat === '全部' ? personnelData : personnelData.filter(p => p.category === cat);
                render(filtered);
            };

            render(personnelData);
        }

        document.getElementById('login-button').addEventListener('click', () => {
            if(document.getElementById('password-input').value === CORRECT_PASSWORD) {
                document.body.classList.remove('login-prompt');
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('app-wrapper').style.display = 'block';
                initApp();
            } else {
                document.getElementById('login-error').textContent = '密碼不對喔！😅';
            }
        });
    </script>
</body>
</html>
